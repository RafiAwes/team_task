services:
  - type: web
    name: team-task
    env: docker
    plan: free # Change to starter or higher for better performance
    region: ohio # TiDB is in Ohio (us-east-2)
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false # Set this to your Render URL (e.g., https://team-task.onrender.com)
      - key: APP_KEY
        fromContext: "static" # You must set this in Render Dashboard manually or here if you have it
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        value: teamtask
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: LOG_CHANNEL
        value: stderr
